[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "dotnet EchoDeck.Mcp.dll"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 8080

# Volume: add a Railway volume via the dashboard and mount it at /data
# Dashboard → your service → Volumes → Add Volume → Mount Path: /data
